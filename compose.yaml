# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker compose reference guide at
# https://docs.docker.com/compose/compose-file/

services:
  lebkuchen-fm:
    build:
      context: .
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017
      # Required — 256-bit base64 key for encrypting secrets at rest.
      # Generate with: openssl rand -base64 32
      # See docs/configuration.md for details.
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY}
    ports:
      # Left side is the host port (change freely); right side is the container port
      # controlled by the PORT env var (defaults to 8080).
      - 8080:8080
    networks:
      - lebkuchen-network
    depends_on:
     - mongo
  mongo:
    container_name: lebkuchen-fm-db-local
    image: mongo:latest
    ports:
      - 27017:27017
    networks:
      - lebkuchen-network

networks:
  lebkuchen-network:
    driver: bridge
